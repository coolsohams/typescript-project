<!DOCTYPE html>
<html>
<head>
    <title>Bank Application</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <script defer src="../bundle.js"></script>
</head>

<body class="p-10">

    <div class="">
        <div class="grid grid-cols-12">
            <!-- COL 1 -->
            <div class="col-span-6 p-4 bg-gray-100">
                <div class="flex flex-col">

                    <!-- Login Form -->
                    <div class="flex flex-col gap-y-1 bg-white p-8 rounded-md border border-gray-300 w-10/12 mx-auto mt-8">
                        <div class="mx-auto">
                            <img src="../public/images/bank-logo.png" class="h-40 w-auto" />
                            <div class="font-extrabold text-center">Welcome to Bank!</div>
                        </div>                        
                        <label>Username</label>
                        <input id="customerId" type="text" class="border border-gray-500 rounded-md h-10" />

                        <label>Password</label>
                        <input id="password" type="password" class="border border-gray-500 rounded-md h-10" />
                        
                        <button class="border mt-2 bg-blue-500 text-white h-12 rounded-sm" id="loginButton">Log In</button>
                    </div>

                    <!-- Login Footer -->
                    <div>
                        <div class="flex flex-row justify-center items-center space-x-10">
                            <a>Not a Customer?</a>
                            <button class="border border-gray-400 mt-2 bg-white text-blue-500 h-12 rounded-sm w-38">Register Now</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- COL 2 -->
            <div class="col-span-6">
                <img src="../public/images/bank-banner.png" />
            </div>
        </div>
    </div>
    
</body>
</html>
